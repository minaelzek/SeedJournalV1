# Production Fly app — deploy with:
#   fly deploy -c fly.production.toml
# Set secrets on app seedjournal-api (DATABASE_URL, JWT_SECRET, OPENAI_API_KEY, ...)

app = "seedjournal-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LLM_PROVIDER = "openai"
  JWT_ALGORITHM = "HS256"
  JWT_ACCESS_EXPIRE_MINUTES = "15"
  EMBEDDING_MODEL = "text-embedding-3-small"
  LLM_MODEL_FAST = "gpt-4o-mini"
  LLM_MODEL_GUIDE = "gpt-4o-mini"
  LLM_TIMEOUT_SEC = "30"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1