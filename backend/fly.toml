# Fly.io — https://fly.io/docs/
# First time: fly launch --no-deploy (from backend/) then attach Postgres (pgvector)
app = "seedjournal-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LLM_PROVIDER = "stub"
  JWT_ALGORITHM = "HS256"
  JWT_ACCESS_EXPIRE_MINUTES = "15"
  EMBEDDING_MODEL = "text-embedding-3-small"
  LLM_MODEL_FAST = "gpt-4o-mini"
  LLM_MODEL_GUIDE = "gpt-4o-mini"
  LLM_TIMEOUT_SEC = "30"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1