services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: seedjournal-db
    environment:
      POSTGRES_USER: seedjournal
      POSTGRES_PASSWORD: seedjournal_dev
      POSTGRES_DB: seedjournal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedjournal -d seedjournal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: