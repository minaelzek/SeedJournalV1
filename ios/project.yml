# XcodeGen — run: brew install xcodegen && cd ios && xcodegen generate
name: SeedJournal
options:
  bundleIdPrefix: com.seedjournal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
  Staging: Config/Staging.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
  Staging: release
targets:
  SeedJournal:
    type: application
    platform: iOS
    sources:
      - path: SeedJournal/Sources
      - path: SeedJournal/Resources
        type: folder
        buildPhase: resources
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
      Staging: Config/Staging.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seedjournal.app
        INFOPLIST_FILE: SeedJournal/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    entitlements:
      path: SeedJournal/SeedJournal.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
schemes:
  SeedJournal:
    build:
      targets:
        SeedJournal: all
    run:
      config: Debug
    archive:
      config: Release
  SeedJournal-Staging:
    build:
      targets:
        SeedJournal: all
    run:
      config: Staging
    archive:
      config: Staging