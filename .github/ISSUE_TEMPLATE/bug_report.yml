name: Bug report
description: Something broken in app, API, or CI
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expect
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - iOS app
        - Backend API
        - CI / GitHub Actions
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or release (optional)
      placeholder: main @ abc1234