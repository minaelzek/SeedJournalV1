name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: seedjournal
          POSTGRES_PASSWORD: seedjournal
          POSTGRES_DB: seedjournal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seedjournal -d seedjournal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+asyncpg://seedjournal:seedjournal@localhost:5432/seedjournal
      APP_ENV: development
      JWT_SECRET: ci-secret

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1',5432)); s.close()" && break
            sleep 1
          done

      - name: Alembic upgrade
        run: alembic upgrade head

      - name: Pytest
        run: pytest -v --tb=short

  # Optional: Actions → "Deploy Staging (Fly)" after FLY_API_TOKEN is set