name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: seedjournal
          POSTGRES_PASSWORD: seedjournal
          POSTGRES_DB: seedjournal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seedjournal -d seedjournal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Migrate
        env:
          DATABASE_URL: postgresql+asyncpg://seedjournal:seedjournal@localhost:5432/seedjournal
          APP_ENV: development
          JWT_SECRET: ci-secret
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://seedjournal:seedjournal@localhost:5432/seedjournal
          APP_ENV: development
          JWT_SECRET: ci-secret
        run: pytest -q

