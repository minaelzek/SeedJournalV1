name: iOS CI

on:
  push:
    branches: [main, master]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build Debug (Simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project SeedJournal.xcodeproj \
            -scheme SeedJournal \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log
          grep -q "BUILD SUCCEEDED" xcodebuild.log

      - name: Build Staging (Simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project SeedJournal.xcodeproj \
            -scheme SeedJournal-Staging \
            -configuration Staging \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild-staging.log
          grep -q "BUILD SUCCEEDED" xcodebuild-staging.log