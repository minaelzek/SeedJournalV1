# Manual Fly deploy after tests pass locally or on main.
# Setup: GitHub → Settings → Secrets → FLY_API_TOKEN
# Run: Actions → Deploy Staging (Fly) → Run workflow

name: Deploy Staging (Fly)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend to Fly
        working-directory: backend
        run: fly deploy --remote-only -a seedjournal-api-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}