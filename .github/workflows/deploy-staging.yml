# Manual Fly deploy after tests pass locally or on main.
# Setup: GitHub → Settings → Secrets → FLY_API_TOKEN
# Run: Actions → Deploy Staging (Fly) → Run workflow

name: Deploy Staging (Fly)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend to Fly
        working-directory: backend
        run: fly deploy --remote-only --depot=false -c fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Smoke staging (after deploy)
        if: success()
        run: |
          BASE="https://seedjournal-api-staging.fly.dev"
          sleep 15
          curl -sf --max-time 90 "$BASE/health" | grep -q '"status"'
          curl -sf --max-time 90 "$BASE/v1/health" | grep -q '"status"'
          echo "Post-deploy smoke OK"